global:
  project_id: '[CHANGE THIS] -- Your Project ID'
  project_number: '[CHANGE THIS] -- Your Project Number'
  cloud_run_sa: '[CHANGE THIS] -- Service account for CloudRun e.g. my-service-account@my-projectid.iam.gserviceaccount.com'
  region: us-central1
vertexai:
  region: us-central1
agent_engine:
  region: us-central1
cloud_run:
  region: us-central1
  use_iap: 'FALSE'
agent:
  name: VogueConciergeAgent
  use_vertexai: 'TRUE'
  google_api_key: ''
  folder: vogue_concierge_agent
  local_port: 8000
  datastores:
    bq:
      dataset_id: vogue_concierge
      dataset_desc: "Vogue Concierge AI Boutique \u2014 inventory and loyalty data"
      dataset_location: US
      inventory_table_name: inventory
      loyalty_table_name: loyalty
    imagegen:
      model_id: imagen-3.0-generate-002
      region: us-central1
    storage:
      bucket_name: vogue-concierge
      bucket_location: US
      image_folder: images
      data_folder: data
      rag_folder: rag
      product_data_file: product.json
      trend_report_file: trend_report.md
      catalog_file: catalog.md
    rag:
      region: us-west1
      corpus_name: vogue-concierge-catalog
      corpus_desc: "Vogue Concierge AI Boutique \u2014 product catalog and trend data"
api:
  name: vogue-concierge-app
  folder: vogue_concierge_app/backend
  local_port: 8080
  remote_port: 8080
ui:
  folder: vogue_concierge_app/frontend
